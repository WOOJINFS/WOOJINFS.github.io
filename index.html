<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WOOJIN [FS]</title>
    <link rel="icon" href="FS2.png" type="image/png">
    <style>
        /* 기본 세팅 */
        body {
            background-color: #000000;
            color: #FFFFFF;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-transform: uppercase;
            overflow-x: hidden; /* 가로 스크롤 잘림 방지 */
        }

        /* 3단 레이아웃 컨테이너 */
        .layout-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 6vw; 
            z-index: 10;
        }

        .column {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px; 
        }

        a {
            color: #FFFFFF;
            text-decoration: none;
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: -1px;
            transition: color 0.2s ease;
        }

        a:hover {
            color: #555555; 
        }

        .center-mv a {
            font-size: 3rem; 
        }

        /* 모바일 화면(너비 768px 이하)일 때 세로로 정렬하는 반응형 코드 */
        @media (max-width: 768px) {
            .layout-container {
                flex-direction: column; /* 세로 배열로 변경 */
                gap: 30px; /* 구역 간격 축소 */
                padding: 50px 0;
            }
            .column {
                gap: 20px;
            }
            a {
                font-size: 2rem; /* 모바일용 폰트 크기 축소 */
            }
            .center-mv a {
                font-size: 2.2rem;
            }
        }

        /* 배경 이미지 세팅 */
        .bg-image {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-size: cover;
            background-position: center;
            opacity: 0; 
            z-index: 1; 
            transition: opacity 0.2s ease; 
            pointer-events: none; 
        }

        .bg-cover { background-image: url('FS.jpg'); }
        .bg-mv { background-image: url('KIM.png'); }
    </style>
</head>
<body>
    <div class="layout-container">
        <div class="column">
            <a href="https://www.youtube.com/watch?v=7wQq98AFqjo" target="_blank" class="cover-link">YOUTUBE</a>
            <a href="https://open.spotify.com/album/7CmkmEZFbcmWnQG5IR6ZF1" target="_blank" class="cover-link">SPOTIFY</a>
            <a href="https://music.apple.com/us/album/1875901449" target="_blank" class="cover-link">APPLE MUSIC</a>
            <a href="#" target="_blank" class="cover-link">MELON</a>
        </div>

        <div class="column center-mv">
            <a href="https://www.youtube.com/watch?v=nNDIk_kHhKk" target="_blank" class="mv-link">KIM MUSIC VIDEO</a>
        </div>

        <div class="column">
            <a href="#" target="_blank" class="cover-link">GENIE</a>
            <a href="#" target="_blank" class="cover-link">BUGS</a>
            <a href="#" target="_blank" class="cover-link">FLO</a>
            <a href="#" target="_blank" class="cover-link">VIBE</a>
        </div>
    </div>

    <div class="bg-image bg-cover"></div>
    <div class="bg-image bg-mv"></div>

    <script>
        const coverLinks = document.querySelectorAll('.cover-link');
        const mvLinks = document.querySelectorAll('.mv-link');
        const bgCover = document.querySelector('.bg-cover');
        const bgMv = document.querySelector('.bg-mv');

        coverLinks.forEach(link => {
            link.addEventListener('mouseenter', () => bgCover.style.opacity = '0.8');
            link.addEventListener('mouseleave', () => bgCover.style.opacity = '0');
        });

        mvLinks.forEach(link => {
            link.addEventListener('mouseenter', () => bgMv.style.opacity = '0.8');
            link.addEventListener('mouseleave', () => bgMv.style.opacity = '0');
        });
    </script>
</body>
</html>

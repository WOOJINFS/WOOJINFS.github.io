<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WOOJIN [FS]</title>
    <link rel="icon" href="FS2.png" type="image/png">
    <style>
        /* CSS 디자인: 여백과 장식을 제거한 극단적 대비 및 대문자 강제 변환 */
        body {
            background-color: #000000;
            color: #FFFFFF;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-transform: uppercase;
        }
        a {
            color: #FFFFFF;
            text-decoration: none;
            font-size: 2.5rem;
            font-weight: 900;
            margin: 25px 0;
            letter-spacing: -1px;
        }
        a:hover {
            color: #555555; 
        }
        
        /* 배경 이미지 공통 속성 세팅 */
        .bg-image {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-size: cover;
            background-position: center;
            opacity: 0; 
            z-index: -1; 
            transition: opacity 0.1s; 
            pointer-events: none; /* 배경 이미지가 마우스 클릭을 방해하지 않도록 처리 */
        }
        
        /* 1. 앨범 커버 배경 이미지 지정 */
        .bg-cover {
            background-image: url('FS.jpg');
        }
        /* 2. 뮤직비디오 배경 이미지 지정 */
        .bg-mv {
            background-image: url('KIM.png'); /* 이미지 확장자가 jpg라면 KIM.jpg로 변경 필요 */
        }

        /* 각 링크 호버 시 해당하는 배경 노출 명령 */
        .cover-link:hover ~ .bg-cover {
            opacity: 0.8; 
        }
        .mv-link:hover ~ .bg-mv {
            opacity: 0.8; 
        }
    </style>
</head>
<body>
    <a href="https://www.youtube.com/watch?v=nNDIk_kHhKk" target="_blank" class="mv-link">KIM MUSIC VIDEO</a>
    <a href="https://www.youtube.com/watch?v=7wQq98AFqjo" target="_blank" class="cover-link">YOUTUBE</a>
    <a href="https://open.spotify.com/album/7CmkmEZFbcmWnQG5IR6ZF1" target="_blank" class="cover-link">SPOTIFY</a>
    <a href="https://music.apple.com/us/album/1875901449" target="_blank" class="cover-link">APPLE MUSIC</a>
    <div class="bg-image bg-cover"></div>
    <div class="bg-image bg-mv"></div>
</body>
</html>

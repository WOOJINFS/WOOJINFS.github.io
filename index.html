<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WOOJIN [FS]</title>
    <link rel="icon" href="FS2.png" type="image/png">
    <style>
        /* CSS 디자인: 여백과 장식을 제거한 극단적 대비 및 대문자 강제 변환 */
        body {
            background-color: #000000;
            color: #FFFFFF;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-transform: uppercase;
        }
        /* 버튼 장식 제거 및 텍스트 하이퍼링크 강조 */
        a {
            color: #FFFFFF;
            text-decoration: none;
            font-size: 2.5rem;
            font-weight: 900;
            margin: 25px 0;
            letter-spacing: -1px;
        }
        /* 시각적 상호작용 (마우스 오버 시 색상 변화) */
        a:hover {
            color: #555555; 
        }
        /* 기습 노출될 배경 이미지의 초기 숨김 상태 세팅 */
        .bg-image {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url('FS.jpg');
            background-size: cover;
            background-position: center;
            opacity: 0; /* 평소에는 투명도 0으로 숨김 */
            z-index: -1; /* 텍스트 뒤에 위치 */
            transition: opacity 0.1s; /* 기괴한 느낌을 위해 0.1초만에 즉각 등장 */
        }
        /* 특정 텍스트에 마우스가 올라갔을 때 배경 등장 명령 */
        .fs-link:hover ~ .bg-image {
            opacity: 0.8; /* 투명도를 0.8로 올려 노출 */
        }
    </style>
</head>
<body>
    <a href="https://open.spotify.com/artist/2YWDrOT5TOWonq3WaQcf7W" target="_blank">SPOTIFY</a>
    <a href="https://www.instagram.com/woojin.wav/" target="_blank">INSTAGRAM</a>
    <a href="https://www.youtube.com/watch?v=FDm7mUIbDYc" target="_blank">"삼촌" MUSIC VIDEO</a>
    
    <a href="여기에 Candid Music 유통 링크 입력" target="_blank" class="fs-link">[FS] ALBUM STREAMING</a>
    
    <div class="bg-image"></div>
</body>
</html>
